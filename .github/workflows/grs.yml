name: Update README Stats

on:
  schedule:
    - cron: "0 3 * * *"   # Roda todo dia às 03:00 UTC
  workflow_dispatch:       # Permite rodar manualmente

permissions:
  contents: write          # Necessário para fazer push no repositório

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Gerar card de estatísticas
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          # Troque github-readme-stats-ricardo.vercel.app pela URL do seu deploy no Vercel (ex: meu-stats.vercel.app)
          api_domain: github-readme-stats-ricardo.vercel.app
          options: username=RicardoAugust-0&show_icons=true&theme=synthwave&hide_border=true&include_all_commits=true&count_private=true
          path: profile/stats.svg
          token: ${{ secrets.GH_TOKEN }}

      - name: Gerar card de linguagens
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          # Troque github-readme-stats-ricardo.vercel.app pela URL do seu deploy no Vercel (ex: meu-stats.vercel.app)
          api_domain: github-readme-stats-ricardo.vercel.app
          options: username=RicardoAugust-0&theme=synthwave&hide_border=true&layout=compact&langs_count=10&size_weight=0.5&count_weight=0.5
          path: profile/top-langs.svg
          token: ${{ secrets.GH_TOKEN }}

      - name: Commit dos SVGs gerados
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "chore: atualizar stats do README [skip ci]" || exit 0
          git push
